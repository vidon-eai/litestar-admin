# 应用服务
services:
  # 数据库服务
  mysql:
    container_name: mysql
    image: mysql:8.0
    restart: always
    environment:
      TZ: "Asia/Shanghai"
      MYSQL_ROOT_PASSWORD: "litestaradmin"
      MYSQL_DATABASE: "litestaradmin"
      MYSQL_PASSWORD: "litestaradmin"
      MYSQL_USER: "litestaradmin"
      MYSQL_TZINFO_TO_SYS_TABLES: 1 # 初始化MySQL时区表，解决时差问题
    ports:
      - "3307:3306"
    volumes:
      # 挂载数据卷，持久化MySQL数据（docker-compose down不会删除数据）
      - ./devops/mysql/data:/var/lib/mysql
      # 挂载宿主机时区文件，双重保障时区同步（只读，避免容器修改）
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - app_network
    # 健康检查：检测MySQL是否真正就绪，避免后端启动早于MySQL
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pyour_mysql_root_password",
        ]
      interval: 5s # 每5秒检测一次
      timeout: 30s # 超时时间30秒
      retries: 10 # 重试10次，失败则认为容器未就绪
      start_period: 20s # 容器启动后，延迟20秒开始检测

  # # redis服务
  # redis:
  #   container_name: redis
  #   image: redis:7.0
