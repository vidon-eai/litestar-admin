  #     # 挂载Redis配置文件，实现自定义配置
  #     - ./devops/redis/data:/data
  #   command: redis-server --requirepass your_redis_password
  #   networks:
  #     - app_network

# 网络
networks:
  app_network:
    driver: bridge
